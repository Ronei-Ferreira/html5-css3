<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Fomulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sexo" id="isxmas" value="M"><label for="isxmas">Mascúlino</label> <br>
         <input type="radio" name="sexo" id="isxfem" value="F" checked><label for="isxmas">Feminino</label> <br>
    </fieldset>
    <fieldset>
        <legend>Esportes favoritos</legend>
        <la><input type="checkbox" name="esbas" id="iesbas" checked><label for="iebas">Basquete </label><br></la>
        <input type="checkbox" name="esfut" id="iesfut" checked><label for="iesfut">Futebol </label><br>
        <input type="checkbox" name="esnat" id="iesnat"><label for="iesnat">Natação</label> <br>
        <input type="checkbox" name="esten" id="iesten"><label for="">Tênis</label> <br>
    </fieldset>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>

    </form>
    
</body>
</html>
