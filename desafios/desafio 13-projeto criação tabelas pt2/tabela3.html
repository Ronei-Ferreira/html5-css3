<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESAFIO PARTE 2</title>
    <style>

         body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {    
            width: 500px;
            border-collapse: collapse;
            position:relative;     
        }

        .color {
            background-color: gray;
            color: white;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }


        thead > tr  {
            color: white;
            position: sticky;
            top: 0;
            background-color: gray; 
            border: 1px solid black;
            padding: 10px;
        }

        tfoot {
            background-color: gray;
            color: white;
        }

        
    </style>
</head>
<body>
    <h1>Desafio criação de tabelas parte 2</h1>

      <table>
          <thead>
                <tr>
                    <td rowspan="4">Área</td>
                    <td rowspan="2">Disciplinas</td>
                    <td colspan="2">Notas</td>
                    <td rowspan="2">Média</td>
                </tr>

                <tr>
                    <td>Nota 1</td>
                    <td>Nota 2</td>
                </tr>
            </thead>

              <tbody>
        <tr>
            <th rowspan="4">Extras</th>
            <td>Matemática</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

        <tr>
            <td>Física</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

        <tr>
            <td>Química</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

        <tr>
            <td>Biologia</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>
    </tbody>

     <tr class="color">
        <td colspan="4"><strong>Média de exatas</strong></td>
        <td>0.0</td>
    </tr>
     <tr>
            <th rowspan="4">Humanas</th>
            <td>História</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

         <tr>
            
            <td>Geografia</td>
            <td>0.0</td>
            <td>0.0</td>
            <td>0.0</td>
        </tr>

    <tfoot>
        <tr>
            <td colspan="4">Média de Humanas</td>
            <td>0.0</td>
        </tr>
    </tfoot>
</table>

      
    
</body>
</html>
